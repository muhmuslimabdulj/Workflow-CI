name: CI - Train Heart Disease Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0

      - name: Run MLflow Project - Train Model
        working-directory: MLProject
        run: |
          mlflow run . --env-manager local

      - name: List MLflow artifacts
        run: |
          echo "Training complete. MLflow artifacts:"
          ls -la MLProject/mlruns/ || echo "No mlruns directory found"
